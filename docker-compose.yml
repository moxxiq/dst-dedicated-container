# Compose file — mainly for development/debug (smoke tests, interactive shell).
# For production DST on a VPS, prefer `./run-dst.sh` (detached, restart policy, ports).
# Phase 3 adds a separate compose/ stack for the FastAPI admin panel + Beszel monitoring.
#
# Volume strategy:
#   - steamcmd-home  (named) → Steam auth cache + steamcmd internals
#   - dst-server     (named) → DST install (~2 GB after first app_update)
#   - ./saves        (bind)  → cluster folders (user-editable, backed up to R2)
#   - ./mods         (bind)  → dedicated_server_mods_setup.lua (entrypoint copies into install)

services:
  dst:
    build:
      context: .
      platforms:
        - linux/amd64
    image: local/steamcmd:latest
    platform: linux/amd64
    container_name: dst
    # stdin/tty on so the DST console is usable when `podman compose run` interactively.
    stdin_open: true
    tty: true
    # DST's UDP ports — mirror run-dst.sh. Two shards → two sets of ports.
    ports:
      - "10999:10999/udp"   # Master game
      - "10998:10998/udp"   # Caves game
      - "8766:8766/udp"     # Master Steam auth
      - "8768:8768/udp"     # Caves Steam auth
      - "27016:27016/udp"   # Master Steam master query
      - "27018:27018/udp"   # Caves Steam master query
    env_file:
      - path: .env
        required: false
    environment:
      CLUSTER_NAME: "${CLUSTER_NAME:-qkation-cooperative}"
      AUTO_UPDATE: "${AUTO_UPDATE:-1}"
    volumes:
      - steamcmd-home:/home/ubuntu/.local/share/Steam  # Steam auth + steamcmd install
      - dst-server:/home/ubuntu/dst                    # DST install (~2 GB)
      # :U tells Podman to chown the bind mount to container UID 1000.
      # Docker ignores :U — on Docker, run: chown -R 1000:1000 ./saves ./mods
      - ./saves:/home/ubuntu/.klei/DoNotStarveTogether:U   # clusters live here (one dir per cluster)
      - ./mods:/home/ubuntu/user-mods:U                    # ServerModSetup manifest
    # Default command runs the full DST lifecycle via entrypoint.
    # Overrides:
    #   podman compose run --rm dst bash                     # shell
    #   podman compose run --rm dst steamcmd +login anonymous +quit

volumes:
  steamcmd-home:
  dst-server:
