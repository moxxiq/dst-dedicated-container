# Beszel self-hosted monitoring — separate compose stack.
# Start with:  cd monitoring && podman compose up -d
# Stop with:   cd monitoring && podman compose down
#
# Exposes the hub UI on :8090. The agent listens on 45876 and reports
# system + container metrics for the host this stack runs on.
#
# First-run setup:
#   1. podman compose up -d
#   2. Open http://<vps-ip>:8090 and create the admin user.
#   3. "Add new system" → name it (e.g. "dst-vps"), host = `agent`, port = 45876.
#   4. The hub shows an SSH public key. Copy it into BESZEL_AGENT_KEY in .env,
#      then `podman compose up -d` again to let the agent trust the hub.
#
# The agent uses the podman socket (compatible with the docker API) to pull
# container stats. DST's container shows up automatically once running.

services:
  beszel:
    image: docker.io/henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - beszel_data:/beszel_data
      - beszel_socket:/beszel_socket
    # UI settings like HUB_URL can be set after first login.

  agent:
    image: docker.io/henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    environment:
      LISTEN: "45876"
      # Populated from monitoring/.env after first hub login. Empty on first
      # boot is fine — the agent will refuse connections until set, which is
      # the secure default.
      KEY: "${BESZEL_AGENT_KEY:-}"
      # Point at the podman socket exposed as docker-compatible API.
      DOCKER_HOST: "unix:///run/podman/podman.sock"
    volumes:
      - beszel_agent_data:/var/lib/beszel-agent
      # Rootless podman socket path on the host. Override via
      # XDG_RUNTIME_DIR if your UID differs from 1000.
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/podman/podman.sock:/run/podman/podman.sock:ro

volumes:
  beszel_data:
  beszel_socket:
  beszel_agent_data:
