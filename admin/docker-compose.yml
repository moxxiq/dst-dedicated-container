# Admin panel stack — separate from the DST container.
# Start with:  cd admin && podman-compose up -d
# Stop with:   cd admin && podman-compose down
#
# We use `podman-compose` (dash, the Python wrapper) rather than
# `podman compose` (space, a podman 4.x subcommand) for Ubuntu 22.04
# compatibility and consistency across environments.
#
# The DST container is launched separately via ../run-dst.sh — this panel
# controls it over the mounted podman socket.

services:
  admin:
    build:
      context: .
      platforms:
        - linux/amd64
    image: local/dst-admin:latest
    platform: linux/amd64
    container_name: dst-admin
    restart: unless-stopped
    ports:
      - "8080:8080"
    # Short-form env_file — podman-compose 1.0.6 (the apt version on Ubuntu
    # 22.04 / 24.04) crashes with TypeError on the Compose-Spec long-form
    # (`- path: ... required: true`). Keep short-form until we bump to a
    # provider that handles it cleanly.
    env_file:
      - ../.env
    environment:
      DST_CONTAINER: "${DST_CONTAINER:-dst}"
      CLUSTER_NAME: "${CLUSTER_NAME:-qkation-cooperative}"
      ADMIN_USER: "${ADMIN_USER:-admin}"
      # ADMIN_PASSWORD comes from ../.env
    volumes:
      # Bind the whole project root at /data so the panel can edit saves/,
      # mods/, parked/, .env, etc. through stable paths.
      # No `:U` here on purpose. The bootstrap already chown -Rs the project
      # tree to dst:dst (host UID 1001), and run-dst.sh runs DST with
      # --userns=keep-id:uid=1000,gid=1000 so its ubuntu (1000) maps to that
      # same host UID. Adding `:U` would auto-chown the entire tree to admin's
      # container UID on every `up`, racing DST writes for no benefit.
      - ..:/data
      # Podman socket from host — lets the panel run `podman start dst` etc.
      # Rootless path on Linux: /run/user/1000/podman/podman.sock
      # If that doesn't exist, fall back to /run/podman/podman.sock (root) or
      # override XDG_RUNTIME_DIR in the compose override.
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/podman/podman.sock:/run/podman/podman.sock
    # The admin container needs to reach the DST container via podman CLI,
    # so it talks to the socket — no direct network linkage needed.
